services:

  loki-init:
    image: busybox
    container_name: smartjam-loki-init
    user: root
    volumes:
      - loki_data:/tmp/loki
    command: chown -R 10001:10001 /tmp/loki

  loki:
    image: grafana/loki
    container_name: smartjam-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/local-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    depends_on:
      loki-init:
        condition: service_completed_successfully

  grafana:
    image: grafana/grafana
    container_name: smartjam-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./infra/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - grafana_data:/var/lib/grafana

  tempo-init:
    image: busybox
    container_name: smartjam-tempo-init
    user: root
    volumes:
      - tempo_data:/tmp/tempo
    command: chown -R 10001:10001 /tmp/tempo

  tempo:
    image: grafana/tempo:2.10.0
    container_name: smartjam-tempo
    ports:
      - "3200:3200"
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/tmp/tempo
    command: -config.file=/etc/tempo.yaml
    depends_on:
      tempo-init:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus
    container_name: smartjam-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver

  alloy:
    image: grafana/alloy
    container_name: smartjam-alloy
    ports:
      - "4317:4317"
      - "4318:4318"
      - "12345:12345"
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy


volumes:
  loki_data:
  tempo_data:
  prometheus_data:
  grafana_data: