services:
  postgres:
    image: postgres:latest
    container_name: smartjam-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: smartjam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d smartjam" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
      start_interval: 2s

  pgadmin:
    image: dpage/pgadmin4
    container_name: smartjam-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:latest
    container_name: smartjam-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
      start_interval: 2s

  redis-insight:
    image: redis/redisinsight:latest
    container_name: smartjam-redis-ui
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2024-03-26T22-10-45Z
    container_name: smartjam-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_NOTIFY_KAFKA_ENABLE_primary: "on"
      MINIO_NOTIFY_KAFKA_BROKERS_primary: kafka:9092
      MINIO_NOTIFY_KAFKA_TOPIC_primary: s3-events
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    container_name: smartjam-minio-init
    depends_on:
      minio:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin; do
          echo 'Waiting for MinIO server...'
          sleep 1
        done
        
        provision_bucket() {
          BUCKET_NAME=$$1
          echo "Provisioning bucket: $$BUCKET_NAME"
        
          /usr/bin/mc mb --ignore-existing myminio/$$BUCKET_NAME
        

          echo "Resetting Kafka events for $$BUCKET_NAME..."
          /usr/bin/mc event remove myminio/$$BUCKET_NAME arn:minio:sqs::primary:kafka --event put || true
          /usr/bin/mc event add myminio/$$BUCKET_NAME arn:minio:sqs::primary:kafka --event put
        }
        
        provision_bucket references
        provision_bucket submissions
        
        echo "MinIO infrastructure setup complete."
      


  kafka:
    image: apache/kafka
    container_name: smartjam-kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_KRAFT_CLUSTER_ID: L69792B199C24976A03504
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-init:
    image: apache/kafka
    container_name: smartjam-kafka-init
    depends_on:
      kafka:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic s3-events --partitions 3 --replication-factor 1
        echo "Topic s3-events created."



  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: smartjam-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka



volumes:
  postgres_data:
  minio_data:
  kafka_data:
