server:
  port: 8081

spring:
  application:
    name: smartjam-api
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/smartjam
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:29092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

    consumer:
      group-id: smartjam-api-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

springdoc:
  swagger-ui:
    path: /swagger
    operations-sorter: alpha
    tags-sorter: alpha
    persist-authorization: true
    url: /api.yaml
  api-docs:
    enabled: true
    path: /v3/api-docs
  show-actuator: false

security:
  jwt:
    secret-key: 9aycyLmiqbP9CrxjEad6YEZJkLBwMOIqeY0VI53Ih5l
    expiration-time-access: 3600000
    expiration-time-refresh: 604800000

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
  buckets:
    references: references
    submissions: submissions
    avatars: avatars
    temp-avatars: temp-avatars
  format-avatar:
    jpeg: "jpeg"
    jpg: "jpg"
    png: "png"