openapi-processor-mapping: v17

options:
  package-name: com.smartjam.api

  model-type: record

  bean-validation: jakarta

  generated: true

  javadoc: true

  target-dir:
    layout: standard

map:

  result: org.springframework.http.ResponseEntity

  types:
    - type: AudioProcessingStatus => com.smartjam.common.model.AudioProcessingStatus
    - type: FeedbackType => com.smartjam.common.model.FeedbackType
    - type: FeedbackEvent => com.smartjam.common.model.FeedbackEvent

    - type: string:uuid => java.util.UUID
    - type: string:date-time => java.time.Instant
    - type: array => java.util.List